<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Extractor</title>
    <link rel="shortcut icon" href="data:image/vnd.microsoft.icon;base64,AAABAAEAEBAAAAEAGABoAwAAFgAAACgAAAAQAAAAIAAAAAEAGAAAAAAAAAMAABILAAASCwAAAAAAAAAAAAD///88OjoAAAAEBAUHAwMBAAAHBwYJLy4OTE0PS0wLLDAMBQcGAgIAAAA7Ojr///////88OjsAAAAMBAMEBQYRZmYTx8gM7O8K9vgK9vgR6+4Vw8USXGIAAAA6Ojr///////8/Oz0AAAANFxkbtLkL//8B+fsB8PUA7vAA7vEA8vIC9/gR//8Wa2o4LS7///////88OzoAAAAfubsF//8A6e4D7fAF7vEB8PIC8PIC7O0G+vgYxcgACQk7Nzf///////86Li4Ia2gM//8A6e4A7/IA7/IA8PIG7/EF7O0D9/oX19gSIR8AAAA6PDz///////9DRkcDzc4F9vwC7u8A7/IA7/IB8PIG7e8B9vUa5ekOLTIJAAAAAAA5Ojr/////+flFe3wA7PAF7/MA8PEA7/IA7/IA7+8F8/UW8/UVQEUAAAAFBwcAAAA6Ojr/////9fZJnJ0A8/YG7+8A7/MA7/IA7/EC7vQM8O4RU1EDAAABBAMDAgMAAAA6Ojr/////9fZJn6AA9PUF7/AA7/IA7/IA7vEA8vcP4uIRKiwEAAAABAQDAwIAAAA6Ojr/////9/hGiYgA8PQF8PAA7/MA7/IA7/IC7fAG/P4T8PESOz4CAAAGBwkAAAA7Ojr/////9fZJn6AA9PUF7/AA7/IA7/IA7vEA8vcP4uIRKiwEAAAABAQDAwIAAAA6Ojr/////9/hGiYgA8PQF8PAA7/MA7/IA7/IC7fAG/P4T8PESOz4CAAAGBwkAAAA7Ojr///////9FV1cG3N8E9PUD7vIA7/IA7fEE+PoRrK4TnpsY8vARRkgIAAAAAAA6Ojr///////86MTEKlJEJ//8C6u0A7/MA7O8J//8PXFsMJSMK+P4M8/QSVlMAAAA7PDz///////86NjUAExcd4+wC+PcB6+wB7vIC8PcQ6OwJ5uYD7/QF7/MU9PoEVlQ7Nzf///////87PTwAAAAZQEQb6O0C/v8B8PEC7e4C7vMC8PQC7O8E7PQE//8S09JEUU////////87OjoAAAAGAAANJywZsK8M8vMH+v8C+/0D+/wJ+v8Q7vMcqagAFBY5Nzf///////87OzoAAAADBgUEAQACAgIQNzgTfXwSm5oTmpkVeXsRMjIGAwIAAAA8Ojv///8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="image/x-icon">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .control-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #f5f5f5;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .control-panel-section {
            margin-right: 20px;
        }

        .control-panel-section label {
            margin-right: 5px;
        }

        .content-area {
            margin-top: 120px; /* Space for the fixed control panel */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #spriteCanvas {
            border: 1px solid black;
            max-width: 100%;
        }

        #previewContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        #zoomPreview {
            border: 1px solid black;
            margin-right: 10px;
        }

        #colorPreview {
            width: 50px;
            height: 50px;
            border: 1px solid black;
        }

        #selectedSpritesContainer {
            position: fixed;
            top: 120px;
            right: 10px;
            width: 200px;
            max-height: 70vh;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ccc;
            z-index: 999;
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 6px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .btn-secondary {
            background-color: #2196F3;
        }

        .btn-secondary:hover {
            background-color: #0b7dda;
        }
    </style>
</head>

<body>
    <div class="control-panel">
        <div class="control-panel-section">
            <input type="file" id="fileInput" accept="image/*">
            <input type="color" id="bgColorInput" value="#ffffff">
            <label for="bgColorInput">Background Color</label>
        </div>
        
        <div class="control-panel-section">
            <label for="fileUrl">URL:</label>
            <input type="text" id="fileUrl" placeholder="https://example.com/spritesheet.png" style="width:200px;" />
            <button id="btnAddUrl" class="btn">Load URL</button>
        </div>
        
        <div class="control-panel-section">
            <input type="text" id="spriteNameInput" placeholder="Sprite Name" style="width:120px;" />
            <button id="detectSprites" class="btn">Detect Sprites</button>
            <button id="saveSprites" class="btn btn-secondary">Save to LocalStorage</button>
            <button id="saveSpritesFirebase" class="btn btn-secondary">Save to Firebase</button>
            <button id="btn-fullscreen" class="btn">Toggle Fullscreen</button>
        </div>
    </div>

    <div class="content-area">
        <div id="previewContainer">
            <canvas id="zoomPreview" width="100" height="100"></canvas>
            <div id="colorPreview"></div>
        </div>
        <canvas id="spriteCanvas"></canvas>
    </div>

    <!-- Floating container for selected sprite copies -->
    <div id="selectedSpritesContainer">
        <p>No sprites selected</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAOWwht5ieLYlbgk_pOYdEQeEAscAxXmeY",
            authDomain: "spritehub-c3a33.firebaseapp.com",
            projectId: "spritehub-c3a33",
            storageBucket: "spritehub-c3a33.firebasestorage.app",
            messagingSenderId: "957606226872",
            appId: "1:957606226872:web:d5244182e4d6a66090bd4d"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let bgColor = null;

        const detectSprites = function (ctx, width, height, bgColor) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const visited = new Array(width * height).fill(false);

            const sprites = [];

            function getIndex(x, y) {
                return (y * width + x) * 4; // RGBA
            }

            function floodFill(startX, startY) {
                const queue = [{ x: startX, y: startY }];
                let minX = startX, maxX = startX;
                let minY = startY, maxY = startY;

                visited[startY * width + startX] = true;

                while (queue.length) {
                    const { x, y } = queue.pop();

                    // Update bounding box
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;

                    // Check neighbors
                    const neighbors = [
                        { nx: x + 1, ny: y },
                        { nx: x - 1, ny: y },
                        { nx: x, ny: y + 1 },
                        { nx: x, ny: y - 1 }
                    ];
                    neighbors.forEach(({ nx, ny }) => {
                        if (
                            nx >= 0 && nx < width &&
                            ny >= 0 && ny < height &&
                            !visited[ny * width + nx]
                        ) {
                            const idx = getIndex(nx, ny);
                            const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
                            if (isOccupiedPixel(r, g, b, a, bgColor)) {
                                visited[ny * width + nx] = true;
                                queue.push({ x: nx, y: ny });
                            }
                        }
                    });
                }

                // Return bounding box
                return {
                    x: minX,
                    y: minY,
                    w: maxX - minX + 1,
                    h: maxY - minY + 1
                };
            }

            // Main loop
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (!visited[y * width + x]) {
                        const idx = getIndex(x, y);
                        const [r, g, b, a] = [data[idx], data[idx + 1], data[idx + 2], data[idx + 3]];
                        if (isOccupiedPixel(r, g, b, a)) {
                            // Found new sprite
                            const spriteBox = floodFill(x, y);
                            sprites.push(spriteBox);
                        }
                    }
                }
            }
            return sprites;
        }

        function isOccupiedPixel(r, g, b, a, bgColor) {
            if (a === 0) return false;
            if (bgColor) {
                return !(r === bgColor.r && g === bgColor.g && b === bgColor.b);
            }
            return true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('spriteCanvas');
            // Enable willReadFrequently for faster repeated getImageData usage
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const zoomPreview = document.getElementById('zoomPreview');
            const zoomCtx = zoomPreview.getContext('2d', { willReadFrequently: true });
            const colorPreview = document.getElementById('colorPreview');
            let sprites = [];
            let selectedSprites = [];
        
            let originalCanvas = document.createElement('canvas');
            let originalCtx = originalCanvas.getContext('2d', { willReadFrequently: true });

            // Convert base64 data URL to a File object
            function base64ToFile(base64String, filename) {
                const arr = base64String.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                return new File([u8arr], filename, { type: mime });
            }

            // Handle "Load from URL"
            document.getElementById('btnAddUrl').addEventListener('click', async () => {
                const fileUrlInput = document.getElementById('fileUrl');
                const url = fileUrlInput.value.trim();
                if (!url) {
                    alert('Please enter a valid URL');
                    return;
                }

                try {
                    const filename = url.split('/').pop() || 'sprite.png';
                    
                    // Direct approach - try to load the image directly first
                    try {
                        const img = new Image();
                        img.crossOrigin = "Anonymous";  // Enable CORS if the server supports it
                        
                        // Set up promise to wait for image load
                        const imageLoadPromise = new Promise((resolve, reject) => {
                            img.onload = () => resolve(img);
                            img.onerror = () => reject(new Error("Failed to load image directly"));
                        });
                        
                        img.src = url;
                        await imageLoadPromise;
                        
                        // Image loaded successfully, proceed with it
                        originalCanvas.width = img.width;
                        originalCanvas.height = img.height;
                        originalCtx.drawImage(img, 0, 0);
                    
                        canvas.width = img.width;
                        canvas.height = img.height;
                        redrawCanvas();
                        
                        fileUrlInput.value = '';
                        return; // Exit if direct loading worked
                    } catch (directErr) {
                        console.log("Direct image loading failed, trying proxy...");
                        // Continue to proxy method if direct loading fails
                    }
                    
                    // Proxy method as fallback
                    const proxyUrl = '/fetch-proxy?url=' + encodeURIComponent(url);
                    const proxyResp = await fetch(proxyUrl);
                    
                    // Check if the response is JSON before trying to parse it
                    const contentType = proxyResp.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new Error(`Expected JSON response but got ${contentType || 'unknown content type'}`);
                    }
                    
                    if (!proxyResp.ok) {
                        throw new Error(`Failed to fetch from proxy: HTTP ${proxyResp.status}`);
                    }
                    
                    const responseData = await proxyResp.json();
                    if (!responseData.success) {
                        throw new Error('Proxy error: ' + (responseData.error || 'Unknown error.'));
                    }
                    
                    // Convert base64 to a File
                    const file = base64ToFile(responseData.base64, filename);

                    // Load the file into the canvas
                    const img = new Image();
                    img.onload = function () {
                        originalCanvas.width = img.width;
                        originalCanvas.height = img.height;
                        originalCtx.drawImage(img, 0, 0);
                    
                        canvas.width = img.width;
                        canvas.height = img.height;
                        redrawCanvas();
                    };
                    img.src = URL.createObjectURL(file);

                    fileUrlInput.value = '';
                } catch (err) {
                    console.error('Image loading error:', err);
                    alert('Failed to load image: ' + err.message + 
                          '\n\nNote: You may need to set up a proxy server to load external images due to CORS restrictions.');
                }
            });

            // Hex to RGB
            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }

            // File input handling
            document.getElementById('fileInput').addEventListener('change', function () {
                const img = new Image();
                img.onload = () => {
                    originalCanvas.width = img.width;
                    originalCanvas.height = img.height;
                    originalCtx.drawImage(img, 0, 0);
            
                    canvas.width = img.width;
                    canvas.height = img.height;
                    redrawCanvas();
                }
                img.src = URL.createObjectURL(this.files[0]);
            });

            // Detect sprites
            document.getElementById('detectSprites').addEventListener('click', () => {
                sprites = detectSprites(originalCtx, originalCanvas.width, originalCanvas.height, bgColor);
                redrawCanvas();
            });

            // Mousemove for zoom/ color sampling
            canvas.addEventListener('mousemove', (event) => {
                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                // Zoom
                zoomCtx.clearRect(0, 0, zoomPreview.width, zoomPreview.height);
                const zoomScale = 10;
                zoomCtx.drawImage(canvas,
                    Math.max(0, x - 5), Math.max(0, y - 5),
                    Math.min(10, canvas.width - x), Math.min(10, canvas.height - y),
                    0, 0, 100, 100);

                // Color preview
                const imageData = ctx.getImageData(x, y, 1, 1).data;
                colorPreview.style.backgroundColor = `rgb(${imageData[0]}, ${imageData[1]}, ${imageData[2]})`;
            });

            // Eyedropper + sprite selection
            canvas.addEventListener('click', (event) => {
                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                // Check if clicking a sprite bounding box
                for (let sprite of sprites) {
                    if (x >= sprite.x && x < sprite.x + sprite.w &&
                        y >= sprite.y && y < sprite.y + sprite.h) {
                        toggleSelection(sprite);
                    }
                }
            });

            function toggleSelection(sprite) {
                const isSelected = selectedSprites.includes(sprite);
                if (!isSelected) {
                    selectedSprites.push(sprite);
                } else {
                    selectedSprites = selectedSprites.filter(s => s !== sprite);
                }
                redrawCanvas();
                updateSelectedSpritesPreview();
            }

            function updateSelectedSpritesPreview() {
                const container = document.getElementById('selectedSpritesContainer');
                if (!container) return;

                container.innerHTML = '';
                if (selectedSprites.length === 0) {
                    container.innerHTML = '<p>No sprites selected</p>';
                    return;
                }

                // For each selected sprite, draw it to a new canvas, then display an <img> of it
                for (let i = 0; i < selectedSprites.length; i++) {
                    const spr = selectedSprites[i];
                    const spriteCanvas = document.createElement('canvas');
                    spriteCanvas.width = spr.w;
                    spriteCanvas.height = spr.h;
                    const spriteCtx = spriteCanvas.getContext('2d');
                    spriteCtx.drawImage(originalCanvas, spr.x, spr.y, spr.w, spr.h, 0, 0, spr.w, spr.h);

                    const dataURL = spriteCanvas.toDataURL();
                    const img = document.createElement('img');
                    img.src = dataURL;
                    img.style.maxWidth = '100px';
                    img.style.display = 'block';
                    img.style.marginBottom = '10px';

                    container.appendChild(img);
                }
            }
            
            function redrawCanvas() {
                ctx.drawImage(originalCanvas, 0, 0);
            }

            // Transparent background
            function makePixelTransparent(data, index) {
                data[index + 3] = 0; // Alpha to 0
            }


            // Save selected sprites -> localStorage
            document.getElementById('saveSprites').addEventListener('click', async () => {
                if (selectedSprites.length === 0) {
                    alert('No selected sprites to save!');
                    return;
                }

                try {
                    let base64Array = [];
                    const existing = localStorage.getItem('myBase64Images');
                    if (existing) {
                        base64Array = JSON.parse(existing);
                    }

                    for (const sprite of selectedSprites) {
                        const spriteCanvas = document.createElement('canvas');
                        spriteCanvas.width = sprite.w;
                        spriteCanvas.height = sprite.h;
                        const spriteCtx = spriteCanvas.getContext('2d', { willReadFrequently: true });
                        spriteCtx.drawImage(originalCanvas, sprite.x, sprite.y, sprite.w, sprite.h, 0, 0, sprite.w, sprite.h);

                        // If bgColor is set, remove that color
                        const spriteImageData = spriteCtx.getImageData(0, 0, sprite.w, sprite.h);
                        const spriteData = spriteImageData.data;
                        if (bgColor) {
                            for (let i = 0; i < spriteData.length; i += 4) {
                                if (spriteData[i] === bgColor.r &&
                                    spriteData[i + 1] === bgColor.g &&
                                    spriteData[i + 2] === bgColor.b) {
                                    makePixelTransparent(spriteData, i);
                                }
                            }
                            spriteCtx.putImageData(spriteImageData, 0, 0);
                        }


                        const dataURL = spriteCanvas.toDataURL();
                        base64Array.push(dataURL);
                    }

                    localStorage.setItem('myBase64Images', JSON.stringify(base64Array));
                    alert(`Saved ${selectedSprites.length} sprites to localStorage!`);
                } catch (error) {
                    console.error('Error saving preview images:', error);
                    alert('Failed to save preview images.');
                }
            });

            // Save selected sprites -> Firebase
            document.getElementById('saveSpritesFirebase').addEventListener('click', async () => {
                if (selectedSprites.length === 0) {
                    alert('No selected sprites to save!');
                    return;
                }

                try {
                    let i = 0;
                    debugger;
                    // Get the base name from input
                    const baseNameInput = document.getElementById('spriteNameInput');
                    const userBaseName = baseNameInput ? baseNameInput.value.trim() : "";

                    for (const sprite of selectedSprites) {
                        const spriteCanvas = document.createElement('canvas');
                        spriteCanvas.width = sprite.w;
                        spriteCanvas.height = sprite.h;
                        const spriteCtx = spriteCanvas.getContext('2d', { willReadFrequently: true });
                        spriteCtx.drawImage(canvas, sprite.x, sprite.y, sprite.w, sprite.h, 0, 0, sprite.w, sprite.h);

                        // If bgColor is set, remove that color
                        const spriteImageData = spriteCtx.getImageData(0, 0, sprite.w, sprite.h);
                        const spriteData = spriteImageData.data;
                        if (bgColor) {
                            for (let idx = 0; idx < spriteData.length; idx += 4) {
                                if (spriteData[idx] === bgColor.r &&
                                    spriteData[idx + 1] === bgColor.g &&
                                    spriteData[idx + 2] === bgColor.b) {
                                    makePixelTransparent(spriteData, idx);
                                }
                            }
                            spriteCtx.putImageData(spriteImageData, 0, 0);
                        }

                        const dataURL = spriteCanvas.toDataURL();

                        // Use userBaseName (or "sprite" if empty)
                        const baseName = userBaseName || 'sprite';
                        // We'll replace invalid chars
                        const sanitizedName = baseName.replace(/[.#$[\]/]/g, '_');
                        // e.g. "mySprite_0"
                        const safeKey = `${sanitizedName}_${i}`;
                        i++;

                        await set(ref(db, 'sprites/' + safeKey), dataURL);
                    }

                    alert(`Saved ${selectedSprites.length} sprites to Firebase!`);
                } catch (err) {
                    console.error('Error saving sprites to Firebase:', err);
                    alert('Error saving sprites to Firebase: ' + err.message);
                }
            });

            // bgColor input
            document.getElementById('bgColorInput').addEventListener('change', function () {
                bgColor = hexToRgb(this.value);
            });
        });
    </script>
</body>
</html>
